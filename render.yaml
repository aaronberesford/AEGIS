services:
  - type: web
    name: aegis-voice-bridge
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run voice:bridge:prod
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-1.5
      - key: OPENAI_REALTIME_VOICE
        value: cedar
